fail-on-severity: "low"
comment-summary-in-pr: on-failure
deny-licenses:
  - GPL-1.0-only
  - GPL-1.0-or-later
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-2.0
  - GPL-3.0-only
  - GPL-3.0-or-later
  - GPL-3.0
  - AGPL-1.0-only
  - AGPL-1.0-or-later
  - AGPL-1.0
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  - AGPL-3.0
allow-dependencies-licenses:
  # All packages below are official NVIDIA libraries published on PyPI by NVIDIA Inc.
  # full license text is available inside each wheel's .dist-info/licenses/ directory
  # datumaro does not bundle or redistribute them
  #
  # Packages covered by the CUDA Toolkit EULA
  # https://docs.nvidia.com/cuda/eula/index.html#attachment-a
  # and separate NVIDIA proprietary licenses available inside each wheel
  - pkg:pypi/nvidia-cuda-runtime
  - pkg:pypi/nvidia-cufft
  - pkg:pypi/nvidia-cublas
  - pkg:pypi/nvidia-cusparse
  - pkg:pypi/nvidia-cusolver
  - pkg:pypi/nvidia-curand
  - pkg:pypi/nvidia-cuda-nvrtc
  - pkg:pypi/nvidia-nvjitlink
  - pkg:pypi/nvidia-cuda-cupti
  - pkg:pypi/nvidia-nvtx
  - pkg:pypi/nvidia-cufile
  - pkg:pypi/cuda-toolkit
  - pkg:pypi/nvidia-nccl-cu13
  - pkg:pypi/nvidia-cudnn-cu13
  - pkg:pypi/nvidia-nvshmem-cu13

  # typing-extensions distribution license is PSF-2.0, as declared in the PyPI,
  # https://pypi.org/pypi/typing-extensions/json
  - pkg:pypi/typing-extensions

  # lxml distribution license is BSD-3-Clause, as declared in the PyPI,
  # https://pypi.org/pypi/lxml/json
  - pkg:pypi/lxml

  # apeye distribution license is LGPL-3.0-or-later, as declared in the PyPI,
  # https://pypi.org/pypi/apeye/json
  - pkg:pypi/apeye

  # rfc3987-syntax distribution license is MIT, as declared in the PyPI,
  # https://pypi.org/pypi/rfc3987-syntax/json
  - pkg:pypi/rfc3987-syntax

  # Artistic-1.0-Perl license is applied for text-unidecode
  # as mentioned in https://github.com/kmike/text-unidecode/blob/master/LICENSE
  - pkg:pypi/text-unidecode

license-check: true
vulnerability-check: true
