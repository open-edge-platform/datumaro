name: Nightly Regression Test
on:
  workflow_dispatch: # run on request (no need for PR)
  schedule:
    - cron: "0 15 * * 2-6" # Every day at 12:00 AM in Korea time
# No permissions by default, no specific permissions are required for this workflow
permissions: {}

defaults:
  run:
    shell: bash
jobs:
  nightly_regression_test:
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04', 'windows-2022', 'macos-15']
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        include:
          - os: "ubuntu-24.04"
            tox-env-os: "lin"
          - os: "windows-2022"
            tox-env-os: "win"
          - os: "macos-15"
            tox-env-os: "mac"
          - python-version: "3.9"
            tox-env-py: "39"
          - python-version: "3.10"
            tox-env-py: "310"
          - python-version: "3.11"
            tox-env-py: "311"
          - python-version: "3.12"
            tox-env-py: "312"
          - python-version: "3.13"
            tox-env-py: "313"
    name: nightly regression test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - name: Installing python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Installing dependencies
        run: |
          python -m pip install tox
      - name: Nightly regression testing
        run: |
          # python -m pytest -v --html=nightly_regression_test_report.html
          tox -e tests-py${{ matrix.tox-env-py }}-${{ matrix.tox-env-os }}
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results-py${{ matrix.tox-env-py }}-${{ matrix.tox-env-os }}
          path: .tox/results-tests-py${{ matrix.tox-env-py }}-${{ matrix.tox-env-os }}.csv
  call-notify-to-teams:
    needs: [nightly_regression_test]
    if: |
      always() &&
      contains(needs.*.result, 'failure')
    uses: ./.github/workflows/notify_teams.yml
    secrets:
      MSTEAMS_WEBHOOK: ${{ secrets.MSTEAMS_WEBHOOK }}
