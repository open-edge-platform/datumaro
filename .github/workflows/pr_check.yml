name: PR Test
on:
  pull_request:
    branches:
      - develop
      - release**
  merge_group:
    branches:
      - develop
      - release**
  push:
    branches:
      - develop
      - release**

permissions:
  # The id-token permission is required by Codecov to use OIDC
  id-token: write

# This is what will cancel the workflow concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
jobs:
  pr_test:
    strategy:
      fail-fast: false
      matrix:
        os: ["overflow", "windows-2022", "macos-15"]
        python-version: ["3.10", "3.14"]
    # Use more descriptive job name for better visibility in CI results
    # Overflow labeled runner is equivalent to ubuntu-latest in terms of resources
    name: pr test (${{ matrix.os == 'overflow' && 'ubuntu-24.04' || matrix.os }}, Python ${{ matrix.python-version }})
    # Use overflow runner for open-edge-platform repos, fall back to ubuntu-latest for forks
    runs-on: ${{ (matrix.os == 'overflow' && github.repository_owner != 'open-edge-platform') && 'ubuntu-latest' || matrix.os }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            cli.codecov.io:443
            ingest.codecov.io:443
            keybase.io:443
            o26192.ingest.us.sentry.io:443
            storage.googleapis.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          python-version: ${{ matrix.python-version }}
          version: "0.8.15"

      - name: Installing dependencies
        run: uv sync --locked --all-extras --dev

      - name: Tests
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          flags: ${{ matrix.os }}_Python-${{ matrix.python-version }}
          use_oidc: true
