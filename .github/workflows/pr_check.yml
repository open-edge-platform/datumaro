name: PR Test
on:
  push:
    branches:
      - "master"
      - "develop"
      - "releases/*"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
permissions:
  # The id-token permission is required by Codecov to use OIDC
  id-token: write

# This is what will cancel the workflow concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
jobs:
  pr_test:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-24.04", "windows-2022", "macos-15"]
        python-version: ["3.9", "3.13"]
        include:
          - python-version: "3.9"
            tox-env-py: "39"
          - python-version: "3.13"
            tox-env-py: "313"
          - os: "ubuntu-24.04"
            tox-env-os: "lin"
          - os: "windows-2022"
            tox-env-os: "win"
          - os: "macos-15"
            tox-env-os: "mac"
    name: pr test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921
        with:
          toolchain: stable
      - name: Installing python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Installing dependencies
        run: |
          python -m pip install tox
      - name: Unit testing
        run: |
          tox -vvv -e tests-py${{ matrix.tox-env-py }}-${{ matrix.tox-env-os }} --develop -- tests/unit --cov --cov-report=xml
      - name: Integration testing
        run: |
          tox -vvv -e tests-py${{ matrix.tox-env-py }}-${{ matrix.tox-env-os }} -- tests/integration
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
        with:
          flags: ${{ matrix.os }}_Python-${{ matrix.python-version }}
          use_oidc: true
