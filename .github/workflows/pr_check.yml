name: PR Test
on:
  push:
    branches:
      - "master"
      - "develop"
      - "releases/*"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
# No permissions by default, no specific permissions are required for this workflow
permissions: {}

# This is what will cancel the workflow concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['macos-13', 'macos-15']
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Installing python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.15.0
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-wheels_${{ matrix.os }}
          path: ./wheelhouse/*.whl
  pr_test:
    if: |
      github.event.pull_request.draft == false &&
      !(startsWith(github.event.pull_request.title, '[WIP]')) &&
      !(startsWith(github.event.pull_request.title, '[Dependent]'))
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-24.04", "windows-2022", "macos-15"]
        python-version: ["3.12", "3.13"]
        include:
          - python-version: "3.12"
            tox-env-py: "312"
          - python-version: "3.13"
            tox-env-py: "313"
          - os: "ubuntu-24.04"
            tox-env-os: "lin"
          - os: "windows-2022"
            tox-env-os: "win"
          - os: "macos-15"
            tox-env-os: "mac"
    name: pr test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b
        with:
          toolchain: stable
      - name: Installing python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Installing dependencies
        run: |
          python -m pip install tox
      - name: Unit testing
        run: |
          tox -vvv -e tests-py${{ matrix.tox-env-py }}-${{ matrix.tox-env-os }} --develop -- tests/unit --cov --cov-report=xml
      - name: Integration testing
        run: |
          tox -vvv -e tests-py${{ matrix.tox-env-py }}-${{ matrix.tox-env-os }} -- tests/integration
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        with:
          flags: ${{ matrix.os }}_Python-${{ matrix.python-version }}
