name: PR Test
on:
  pull_request:
    branches:
      - develop
      - release**
  merge_group:
    branches:
      - develop
      - release**
  push:
    branches:
      - develop
      - release**

permissions:
  # The id-token permission is required by Codecov to use OIDC
  id-token: write

# This is what will cancel the workflow concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
jobs:
  pr_test:
    strategy:
      fail-fast: false
      matrix:
        os: ["overflow", "windows-2022", "macos-15"]
        python-version: ["3.10", "3.14"]
    # Use more descriptive job name for better visibility in CI results
    # Overflow labeled runner is equivalent to ubuntu-latest in terms of resources
    name: pr test (${{ matrix.os == 'overflow' && 'ubuntu-24.04' || matrix.os }}, Python ${{ matrix.python-version }})
    # Use overflow runner for open-edge-platform repos, fall back to ubuntu-latest for forks
    runs-on: ${{ (matrix.os == 'overflow' && github.repository_owner != 'open-edge-platform') && 'ubuntu-latest' || matrix.os }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            cli.codecov.io:443
            files.pythonhosted.org:443
            github.com:443
            index.crates.io:443
            ingest.codecov.io:443
            keybase.io:443
            o26192.ingest.us.sentry.io:443
            objects.githubusercontent.com:443
            ossci-datasets.s3.amazonaws.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            releases.astral.sh:443
            static.crates.io:443
            static.rust-lang.org:443
            storage.googleapis.com:443
            yann.lecun.com:80
      
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
          python-version: ${{ matrix.python-version }}
          version: "0.8.15"

      - name: Installing dependencies
        run: uv sync --locked --all-extras --dev

      - name: Tests
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          flags: ${{ matrix.os }}_Python-${{ matrix.python-version }}
          use_oidc: true
