name: Build Docs for releases

on:
  release:
    types: [published]

# No permissions by default
permissions: {}

jobs:
  Build-Docs:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            168.63.129.16:80
            docs.python.org:443
            github.com:443
            numpy.org:443
            static.crates.io:443
      
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # otherwise, you will failed to push refs to dest repo
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          python-version: "3.10"
          version: "0.8.15"

      - name: Installing dependencies
        run: |
          sudo apt-get install pandoc graphviz
          uv lock --check
          uv sync --frozen --extra docs

      - name: Build-Docs
        run: |
          cd docs
          uv run make clean
          uv run make html

      - name: Create gh-pages branch
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          existed_in_remote=$(git ls-remote --heads origin gh-pages)

          if [[ -z ${existed_in_remote} ]]; then
            echo "Creating gh-pages branch"
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git checkout --orphan gh-pages
            git reset --hard
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initializing gh-pages branch"
            git push origin gh-pages
            git checkout "$TAG_NAME"
            echo "Created gh-pages branch"
          else
            echo "Branch gh-pages already exists"
          fi

      - name: Commit docs to gh-pages branch
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          git fetch
          git checkout gh-pages
          mkdir -p /tmp/docs_build
          cp -r docs/build/html/* /tmp/docs_build/
          rm -rf $TAG_NAME/*
          echo '<html><head><meta http-equiv="refresh" content="0; url=stable/" /></head></html>' > index.html
          mkdir -p $TAG_NAME
          cp -r /tmp/docs_build/* ./$TAG_NAME
          ln -sfn $TAG_NAME stable
          rm -rf /tmp/docs_build
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./index.html ./stable $TAG_NAME
          git commit -m "Update documentation" -a || true

      - name: Push changes
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599 # v1.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
