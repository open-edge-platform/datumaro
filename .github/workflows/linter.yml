name: Linter
on:
  pull_request:
    branches:
      - develop
      - release**
  merge_group:
    branches:
      - develop
      - release**
  push:
    branches:
      - develop
      - release**

# No permissions by default, no specific permissions are required for this workflow
permissions: {}
jobs:
  pre-commit:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            files.pythonhosted.org:443
            github.com:443
            mirrors.cloud.tencent.com:443
            nodejs.org:443
            pypi.org:443
            pypi.tuna.tsinghua.edu.cn:443
            registry.npmjs.org:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      # Install pre-commit
      - name: Install pre-commit
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install prek

      # Execute pre-commit checks
      - name: Run pre-commit checks
        shell: bash
        run: prek run --all-files
