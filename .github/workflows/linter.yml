name: Linter
on:
  pull_request:
    branches:
      - develop
      - release**
  merge_group:
    branches:
      - develop
      - release**
  push:
    branches:
      - develop
      - release**

# No permissions by default, no specific permissions are required for this workflow
permissions: {}
jobs:
  pre-commit:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            crates.io:443
            files.pythonhosted.org:443
            github.com:443
            index.crates.io:443
            mirrors.cloud.tencent.com:443
            nodejs.org:443
            pypi.org:443
            pypi.tuna.tsinghua.edu.cn:443
            registry.npmjs.org:443
            static.crates.io:443
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"

      # Install pre-commit
      - name: Install pre-commit
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install prek

      # Execute pre-commit checks
      - name: Run pre-commit checks
        shell: bash
        run: prek run --all-files
