[tox]
isolated_build = true
skip_missing_interpreters = true

[testenv]
passenv =
    USERNAME
    LOCALAPPDATA
setenv =
    MPLBACKEND=agg
deps =
    -r{toxinidir}/tests/requirements.txt
extras =
    default
    # Exclude Tensorflow from Python 3.13 as it is not supported yet
    # Also exclude TensorFlow from the MacOS checks due to the following issue:
    # https://github.com/tensorflow/tensorflow/issues/98563
    tests-py{39,310,311,312}-{lin,win}: tf
    tests-py{39,310,311,312}-{lin,win}: tfds
    torch
    kaggle
    scipy
    nlp
    tabulate
    visualizer
    h5py
    nibabel
    protobuf
    cli
    experimental


[testenv:pre-commit]
basepython = python3
deps =
    pre-commit
commands = pre-commit run --show-diff-on-failure --color=always --all-files


[testenv:build-docs]
deps =
    -r{toxinidir}/docs/requirements.txt
use_develop = true
change_dir = {toxinidir}/docs
allowlist_externals =
    make
commands =
    make clean
    make html

[testenv:tests-py{39,310,311,312,313}-{lin,win,mac}]
commands =
    python -m pytest -v --csv={toxworkdir}/results-{envname}.csv {posargs:tests}


[testenv:validation]
commands =
    python -m pytest -v --csv={toxworkdir}/results_val_{envname}.csv -m {posargs:new}

[testenv:fuzzing]
deps=
    {[testenv]deps}
    atheris
extras =
    cli
    experimental
allowlist_externals =
    bash
commands_pre =
    bash -c 'cargo -V; echo "cargo (rust) version checking exit code = $?"'
commands =
    ; coverage erase
    python tests/fuzzing/cli_fuzzing.py {posargs:-dict=tests/fuzzing/assets/cli_operations.dict -artifact_prefix={toxworkdir}/ -print_final_stats=1 -atheris_runs=500000}
    ; coverage report --precision=2

[testenv:stability-{default,tf,tfds,torch}]
deps =
    {[testenv:fuzzing]deps}
extras =
    tf: tf
    tfds: tfds
    torch: torch
    cli
    experimental
allowlist_externals =
    bash
commands_pre =
    bash -c 'cargo -V; echo "cargo (rust) version checking exit code = $?"'
commands =
    python tests/fuzzing/cli_fuzzing.py {posargs:-dict=tests/fuzzing/assets/cli_operations.dict -artifact_prefix={toxworkdir}/ -print_final_stats=1 -atheris_runs=5000}
